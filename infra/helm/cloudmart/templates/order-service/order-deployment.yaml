apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: 506098131053.dkr.ecr.us-east-1.amazonaws.com/cloudmart-order-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5003
          envFrom:
            - configMapRef:
                name: order-config
            - secretRef:
                name: order-secret
          resources:
              requests:
                cpu: "100m"
                memory: "128Mi"
              limits:
                cpu: "500m"
                memory: "512Mi"
          readinessProbe:
              httpGet:
                 path: /health
                 port: 5003
              initialDelaySeconds: 10
              periodSeconds: 5

          livenessProbe:
                httpGet:
                  path: /health
                  port: 5003
                initialDelaySeconds: 20
                periodSeconds: 10